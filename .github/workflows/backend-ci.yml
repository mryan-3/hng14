name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'stage3/backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'stage3/backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean verify
      working-directory: stage3/backend
