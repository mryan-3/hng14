name: CLI CI

on:
  push:
    branches: [ main ]
    paths:
      - 'stage3/cli/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'stage3/cli/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: 'stage3/cli/pnpm-lock.yaml'

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      working-directory: stage3/cli

    - name: Build
      run: pnpm run build
      working-directory: stage3/cli
